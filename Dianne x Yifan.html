function useShown(active){
  const [s,setS]=useState(false);
  useEffect(()=>{
    if(active){const t=setTimeout(()=>setS(true),60);return()=>clearTimeout(t);}
    else setS(false);
  },[active]);
  return s;
}

function Blossom({x,y,size=1,delay=0,color='#E8748A'}){
  const w=34*size,h=34*size;
  return(
    <div style={{position:'absolute',left:x,top:y,pointerEvents:'none',animation:`bloom 0.65s ${delay}s both`}}>
      <svg width={w} height={h} viewBox="0 0 34 34">
        {[0,72,144,216,288].map((a,i)=>{
          const rad=(a-90)*Math.PI/180;
          const cx=17+8*Math.cos(rad),cy=17+8*Math.sin(rad);
          return <ellipse key={i} cx={cx} cy={cy} rx={5.5} ry={3.5} fill={color} transform={`rotate(${a-90},${cx},${cy})`}/>;
        })}
        <circle cx={17} cy={17} r={3.2} fill="#FFF0B0"/>
      </svg>
    </div>
  );
}

function Cloud({x,y,s=1}){
  return(
    <div style={{position:'absolute',left:x,top:y,pointerEvents:'none'}}>
      <svg width={100*s} height={52*s} viewBox="0 0 100 52">
        <ellipse cx={50} cy={36} rx={40} ry={20} fill="white" opacity={0.86}/>
        <ellipse cx={34} cy={28} rx={26} ry={18} fill="white" opacity={0.86}/>
        <ellipse cx={68} cy={30} rx={22} ry={16} fill="white" opacity={0.86}/>
      </svg>
    </div>
  );
}

function wavePts(amp,yBase,phase=0,steps=80){
  const pts=[];
  for(let i=0;i<=steps;i++){
    const x=(i/steps)*370;
    const y=yBase+amp*Math.sin((i/steps)*Math.PI*4+phase);
    pts.push(`${x},${y}`);
  }
  return pts.join(' ');
}

// ── SLIDE 8: MOST ACTIVE DAYS — physics ball pit ─────────────────────────────
function SlideChristmas({active}){
  const shown=useShown(active);
  const canvasRef=useRef(null);
  const cleanupRef=useRef(null);

  const W=window.innerWidth, H=window.innerHeight;
  const DAYS=[
    {date:'Dec 24',sub:'1,212 msgs',color:'#6B8E5A',r:109},
    {date:'Feb 4', sub:'973 msgs',  color:'#7AAFB0',r:90},
    {date:'Dec 28',sub:'917 msgs',  color:'#5A7896',r:84},
    {date:'Jan 29',sub:'880 msgs',  color:'#D4A030',r:80},
    {date:'Aug 2', sub:'878 msgs',  color:'#E07878',r:76},
  ];

  useEffect(()=>{
    if(!active||!canvasRef.current) return;
    if(typeof Matter==='undefined') return;

    const {Engine,Render,Runner,Bodies,Body,World,Mouse,MouseConstraint,Events}=Matter;
    const engine=Engine.create({gravity:{y:1.4}});
    const render=Render.create({
      canvas:canvasRef.current,
      engine,
      options:{width:W,height:H,wireframes:false,background:'#B8D0CC'},
    });

    // walls: floor, left, right, ceiling (off-screen so balls fall in)
    const walls=[
      Bodies.rectangle(W/2,H+20,W+40,40,{isStatic:true,render:{fillStyle:'#B8D0CC'}}),
      Bodies.rectangle(-20,H/2,40,H+40,{isStatic:true,render:{fillStyle:'#B8D0CC'}}),
      Bodies.rectangle(W+20,H/2,40,H+40,{isStatic:true,render:{fillStyle:'#B8D0CC'}}),
    ];
    World.add(engine.world,walls);

    // drop balls from above with slight spread
    const balls=DAYS.map((d,i)=>{
      const x=70+i*62+(Math.random()-0.5)*18;
      const y=-d.r*2 - i*160;
      const b=Bodies.circle(x,y,d.r,{
        restitution:0.45,friction:0.08,frictionAir:0.015,
        render:{fillStyle:d.color},
      });
      b.dayData=d;
      return b;
    });
    World.add(engine.world,balls);

    // mouse drag
    const mouse=Mouse.create(canvasRef.current);
    const mc=MouseConstraint.create(engine,{
      mouse,constraint:{stiffness:0.22,render:{visible:false}},
    });
    World.add(engine.world,mc);
    render.mouse=mouse;

    // draw text labels on balls
    Events.on(render,'afterRender',()=>{
      const ctx=render.context;
      balls.forEach(b=>{
        const {x,y}=b.position;
        const d=b.dayData;
        ctx.save();
        ctx.translate(x,y);
        ctx.rotate(b.angle);
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillStyle='rgba(255,255,255,0.95)';
        ctx.font=`700 ${Math.round(d.r*0.34)}px 'Caveat',cursive`;
        ctx.fillText(d.date,0,-d.r*0.18);
        ctx.fillStyle='rgba(255,255,255,0.65)';
        ctx.font=`${Math.round(d.r*0.24)}px 'Space Grotesk',sans-serif`;
        ctx.fillText(d.sub,0,d.r*0.28);
        ctx.restore();
      });
    });

    Render.run(render);
    const runner=Runner.create();
    Runner.run(runner,engine);

    cleanupRef.current=()=>{
      Render.stop(render);
      Runner.stop(runner);
      World.clear(engine.world,false);
      Engine.clear(engine);
    };
    return()=>{ cleanupRef.current&&cleanupRef.current(); };
  },[active]);

  return(
    <div style={{width:'100%',height:'100%',background:'#B8D0CC',position:'relative',overflow:'hidden'}}>
      <canvas ref={canvasRef} width={W} height={H} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}}/>
      {shown&&(
        <div style={{position:'absolute',top:56,left:32,pointerEvents:'none',animation:'slideUp 0.5s both'}}>
          <div style={{fontFamily:'Caveat',fontSize:30,color:'#2A2035'}}>most active days</div>
        </div>
      )}
    </div>
  );
}

// ── APP ──────────────────────────────────────────────────────────────────────
const SLIDES=[SlideCover,SlideNumbers,SlideWho,SlideBaobao,SlideNight,SlideLanguage,SlideSeasons,SlideChristmas,SlideCalls,SlideForever];
const N=SLIDES.length;

function App(){
  const [cur,setCur]=useState(()=>{
    try{const s=localStorage.getItem('dxyCur');return s?Math.min(parseInt(s),N-1):0;}catch{return 0;}
  });
  const [tweaks,setTweaks]=useState(TWEAK_DEFAULTS);
  const [tweaksVisible,setTweaksVisible]=useState(false);
  const touchX=useRef(null);

  useEffect(()=>{
    const handler=(e)=>{
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  const go=(n)=>{
    const next=Math.max(0,Math.min(N-1,n));
    setCur(next);
    try{localStorage.setItem('dxyCur',next);}catch{}
  };
  const onTouchStart=(e)=>{touchX.current=e.touches[0].clientX;};
  const onTouchEnd=(e)=>{
    if(touchX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchX.current;
    if(Math.abs(dx)>38)go(cur+(dx<0?1:-1));
    touchX.current=null;
  };
  const onClick=(e)=>{
    const r=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-r.left;
    if(x<r.width*0.32)go(cur-1);
    else if(x>r.width*0.68)go(cur+1);
  };

  useEffect(()=>{
    // no scaling needed — fills viewport
  },[]);

  return(
    <>
      <div className="phone-outer">
        <div className="phone" onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onClick={onClick}>
          <div className="di"/>
          <div className="slides">
            {SLIDES.map((Slide,i)=>(
              <div key={i} className="slide" style={{transform:`translateX(${(i-cur)*100}%)`}}>
                <Slide active={i===cur} onReplay={()=>go(0)} tweaks={tweaks}/>
              </div>
            ))}
          </div>
          <div className="dots">
            {SLIDES.map((_,i)=>(
              <div key={i} className={`dot${i===cur?' on':''}`} style={{width:i===cur?18:5}}/>
            ))}
          </div>
        </div>
      </div>
      {tweaksVisible&&(
        <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'white',borderRadius:16,boxShadow:'0 8px 40px rgba(0,0,0,0.18)',padding:'18px 20px',width:220,fontFamily:'Space Grotesk'}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:14,letterSpacing:0.5,color:'#222'}}>Tweaks</div>
          <label style={{display:'block',fontSize:11,color:'#999',marginBottom:4}}>Days count</label>
          <input type="text" value={tweaks.daysCount} onChange={e=>{
            const next={...tweaks,daysCount:e.target.value};
            setTweaks(next);
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
          }} style={{width:'100%',border:'1.5px solid #eee',borderRadius:8,padding:'6px 10px',fontSize:14,marginBottom:12,outline:'none'}}/>
          <label style={{display:'block',fontSize:11,color:'#999',marginBottom:4}}>Cover title</label>
          <input type="text" value={tweaks.coverTitle} onChange={e=>{
            const next={...tweaks,coverTitle:e.target.value};
            setTweaks(next);
            window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');
          }} style={{width:'100%',border:'1.5px solid #eee',borderRadius:8,padding:'6px 10px',fontSize:14,marginBottom:12,outline:'none'}}/>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
